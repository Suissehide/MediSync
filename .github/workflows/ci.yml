name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main

jobs:
  lint-front:
    name: Lint (front)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: front
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: front/.nvmrc
          cache: npm
          cache-dependency-path: front/package-lock.json
      - run: npm ci
      - run: npm run lint

  build-front:
    name: Build (front)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: front
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: front/.nvmrc
          cache: npm
          cache-dependency-path: front/package-lock.json
      - run: npm ci
      - run: npm run build
        env:
          VITE_API_BASE_URL: http://localhost:3000
          VITE_ENVIRONMENT: production

  lint-back:
    name: Lint (back)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: back
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: back/.nvmrc
          cache: npm
          cache-dependency-path: back/package-lock.json
      - run: npm ci
      - run: npm run lint

  build-back:
    name: Build (back)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: back
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: back/.nvmrc
          cache: npm
          cache-dependency-path: back/package-lock.json
      - run: npm ci
      - run: npm run build
